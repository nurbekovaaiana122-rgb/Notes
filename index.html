<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Заметки — Мини-приложение</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Заметки</h1>
      <div class="controls">
        <button id="themeBtn" title="Переключить тему">🌓</button>
        <button id="exportBtn" title="Экспорт заметок">⤓</button>
        <button id="importBtn" title="Импорт заметок">⤒</button>
        <input id="importFile" type="file" accept=".json" style="display:none">
      </div>
    </header>

    <main>
      <aside class="sidebar">
        <div class="search-wrap">
          <input id="search" placeholder="Поиск..." />
          <button id="newBtn" title="Новая заметка">＋</button>
        </div>
        <ul id="notesList" class="notes-list"></ul>
      </aside>

      <section class="editor">
        <input id="noteTitle" placeholder="Заголовок" />
        <textarea id="noteBody" placeholder="Текст заметки..."></textarea>

        <div class="editor-actions">
          <button id="saveBtn">Сохранить</button>
          <button id="deleteBtn" class="danger">Удалить</button>
          <div class="spacer"></div>
          <label class="toggle">
            <input type="checkbox" id="autosaveToggle" />
            <span>Автосохранение</span>
          </label>
        </div>
      </section>
    </main>

    <footer>Заметки сохраняются в браузере (localStorage). Экспорт/импорт в JSON.</footer>
  </div>

<script src="script.js"></script>
</body>
</html>
